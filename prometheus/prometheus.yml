global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auto-scaler'
    static_configs:
      - targets: ['auto-scaler:8080']
    metrics_path: '/actuator/prometheus'

  - job_name: 'main-app'
    static_configs:
      - targets: ['main-app-1:8080']
    metrics_path: '/actuator/prometheus'

  - job_name: 'notification-worker'
    static_configs:
      - targets: ['notification-worker:8082']
    metrics_path: '/actuator/prometheus'

  - job_name: 'analytics-worker'
    static_configs:
      - targets: ['analytics-worker:8083']
    metrics_path: '/actuator/prometheus'

  - job_name: 'remediation-worker'
    static_configs:
      - targets: ['remediation-worker:8084']
    metrics_path: '/actuator/prometheus'